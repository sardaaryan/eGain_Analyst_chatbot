<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PackageAssist — Support Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-shell">

    <!-- Header -->
    <div class="header">
      <div class="header-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <div class="header-info">
        <div class="header-title">PackageAssist</div>
        <div class="header-subtitle">
          <span class="status-dot"></span>
          Online · Typically replies instantly
        </div>
      </div>
      <div class="header-badge">Support</div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chat-area"></div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-row">
        <input type="text" id="user-input" placeholder="Type a message…" autocomplete="off">
        <button id="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="white">
            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Try order IDs: EG12345 · EG22222 · EG33333 · EG99999</div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
